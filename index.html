<head>
    <meta charset="UTF-8" />
    <title>Silvia</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="referrer" content="no-referrer">

    <meta name="title" content="Silvia" />
    <meta name="description" content="FOSS modular video synthesizer for live performance and visual experimentation." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://silvia.app/" />
    <meta property="og:title" content="Silvia" />
    <meta property="og:description" content="FOSS modular video synthesizer for live performance and visual experimentation." />
    <meta property="og:image" content="https://silvia.app/assets/images/woahsplash.png" />

    <!-- X (Twitter) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://silvia.app/" />
    <meta property="twitter:title" content="Silvia" />
    <meta property="twitter:description" content="FOSS modular video synthesizer for live performance and visual experimentation." />
    <meta property="twitter:image" content="https://silvia.app/assets/images/woahsplash.png" />

    <link href="lib/modern-normalize.min.css" rel="stylesheet" />
    <style>
        body {
            /* initial dark background to prevent white flash on load */
            background: #1a1a1a;
        }
    </style>

    <link rel="stylesheet" href="styles/main.css">

    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">

    <script src="lib/gifler.min.js"></script>
</head>

<body>
    <div id="editor">
        <div id="node-root"></div>
        <svg id="connection-root"></svg>
    </div>
    <div id="workspace-controls">
        <button id="workspace-extend-btn" title="Extend Workspace Width"><span class="ws-ctrl-label">Extend</span><span class="ws-ctrl-icon" data-icon="arrow-right-to-line"></span></button>
        <button id="workspace-crop-btn" title="Crop Workspace Width"><span class="ws-ctrl-label">Crop</span><span class="ws-ctrl-icon" data-icon="arrow-left-to-line"></span></button>
        <button id="auto-layout-btn" title="Auto-Layout Nodes"><span class="ws-ctrl-label">Layout</span><span class="ws-ctrl-icon" data-icon="columns-3"></span></button>
    </div>
    <div id="app-menu-wrapper">
        <button id="app-menu-toggle" class="floating-btn"><span class="floating-btn-icon" data-icon="menu"></span><span class="floating-btn-label">Menu</span></button>
        <div id="app-menu" class="app-menu hidden">
            <button id="quick-save-btn">Save</button>
            <button id="save-btn">Save As...</button>
            <button id="open-btn">Open...</button>
            <button id="save-session-btn">Save Quickload</button>
            <button id="asset-manager-btn" style="display: none;" title="Asset Manager (Ctrl+Shift+A)">Assets</button>
            <button id="settings-btn">Theme</button>
            <button id="midi-btn">MIDI</button>
            <button id="about-btn">About</button>
            <button id="howto-btn">How To</button>
        </div>
    </div>
    <div class="floating-btn-container">
        <button id="nodes-menu-btn" class="floating-btn"><span class="floating-btn-icon"><img src="assets/icons/favicon-16x16.png" style="vertical-align: text-bottom;"></span><span class="floating-btn-label">Nodes</span></button>
    </div>
    <div id="modal-container"></div>
    <script>
        window.isElectronMode = /electron/i.test(navigator.userAgent);
    </script>
    <script type="module" src="main.js"></script>
</body>

</html>
